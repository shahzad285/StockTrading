name: Deploy StockTrading API

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Publish
        run: dotnet publish ./StockTrading.Apis/StockTrading.Apis.csproj -c Release -r linux-x64 --self-contained true -o ./publish

      - name: Prepare deploy directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            rm -rf /tmp/stocktradingapi-publish
            mkdir -p /tmp/stocktradingapi-publish

      - name: Upload files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "publish/*"
          target: "/tmp/stocktradingapi-publish"
          strip_components: 1

      - name: Install and restart API service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            sudo mkdir -p /var/www/stocktradingapi
            sudo rm -rf /var/www/stocktradingapi/*
            sudo cp -a /tmp/stocktradingapi-publish/. /var/www/stocktradingapi/
            sudo chmod +x /var/www/stocktradingapi/StockTrading.Apis
            sudo -u postgres psql -tc "SELECT 1 FROM pg_database WHERE datname = 'stocktrading'" | grep -q 1 || sudo -u postgres createdb stocktrading
            sudo systemctl restart stocktradingapi
            sudo systemctl status stocktradingapi --no-pager
